
pipeline:
  project_name: "amex-risk-pipeline"
  version: "1.0.0"
  random_state: 42
  
  # Data paths relative to project root
  data:
    raw_data_path: "data/raw/"
    processed_data_path: "data/processed/"
    train_file: "train.csv"
    test_file: "test.csv"
    target_column: "target"
    
  # Feature engineering / Preprocessing settings
  preprocessing:
    missing_value_strategy: "median"  # options: mean, median, most_frequent
    scaling_method: "standard"        # options: standard, minmax
    categorical_encoding: "target"     # options: target, onehot, label
    min_properties_filter: 1          # validation parameter for incoming dict structures

# Machine Learning Engine Configuration
models:
  active_model: "lightgbm"
  output_dir: "models/"
  
  # LightGBM Hyperparameters for Credit Risk modeling
  lightgbm:
    objective: "binary"
    metric: "auc"
    boosting_type: "gbdt"
    n_estimators: 500
    learning_rate: 0.05
    num_leaves: 31
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    n_jobs: -1

  # Cross-validation Strategy
  validation:
    strategy: "stratified_kfold"
    n_splits: 5
    shuffle: true

# Backend Service Configuration (FastAPI & Uvicorn)
backend:
  host: "0.0.0.0"
  port: 8000
  workers: 2
  debug: false