name: Credit Risk Engine Continuous Integration Engine
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Repository Base
      uses: actions/checkout@v4
    - name: Set up Python Environment Pipeline
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install Pinned Dependencies Matrix
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
        pip install pytest httpx
    - name: Build System Generation & Baseline Simulation Check
      run: |
        mkdir -p data models
        python src/data_pipeline.py
    - name: Execute Automated Pytest Suite Execution
      run: |
        pytest tests/ -v
